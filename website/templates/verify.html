<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Door Scanner • The Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
    <div class="max-w-md mx-auto text-center">
        <h1 class="text-4xl font-bold mb-8">🎟️ Door Scanner</h1>

        <div id="reader" class="w-full aspect-square bg-black rounded-3xl overflow-hidden mb-6"></div>

        <div id="result" class="text-xl font-medium min-h-[120px] p-6 rounded-3xl bg-zinc-900"></div>

        <button onclick="location.reload()"
                class="mt-6 px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">
            🔄 Restart Scanner
        </button>
    </div>

    <script>
    const html5QrCode = new Html5Qrcode("reader");

    function onScanSuccess(decodedText) {
        html5QrCode.stop().catch(() => {});

        document.getElementById('result').innerHTML =
            `<span class="text-yellow-400">Verifying...</span>`;

        fetch('/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticket_data: decodedText })
        })
        .then(r => r.text())
        .then(result => {
            const success = result.includes('Accepted') || result.includes('Welcome');
            document.getElementById('result').innerHTML =
                `<span class="${success ? 'text-emerald-400' : 'text-red-400'} text-lg">${result}</span>`;
        })
        .catch(() => {
            document.getElementById('result').innerHTML =
                `<span class="text-red-400">Network error. Try again.</span>`;
        });
    }

    function onScanFailure(error) {
        // Called constantly when no code is visible — safe to ignore
    }

    // ✅ This is the key fix — always returns a perfect square
    const qrboxFunction = function (viewfinderWidth, viewfinderHeight) {
        const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
        const qrboxSize = Math.floor(minEdge * 0.72); // ~72% gives nice margins + reliable scanning
        return {
            width: qrboxSize,
            height: qrboxSize
        };
    };

    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: qrboxFunction,        // ← Now always a perfect square
        },
        onScanSuccess,
        onScanFailure
    ).catch(err => {
        console.error(err);
        document.getElementById('result').innerHTML =
            `<span class="text-red-400">Camera error. Allow camera access and tap Restart.</span>`;
    });
</script>
</body>
</html>
