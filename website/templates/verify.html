<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Door Scanner • The Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-3 sm:p-4">
    <div class="max-w-lg mx-auto text-center">
        <form method="POST" action="/verify/logout" class="text-right mb-2">
            <button type="submit" class="text-xs text-zinc-500 hover:text-white transition-colors">Sign out</button>
        </form>
        <div id="admission-totals" class="grid grid-cols-3 gap-2 mb-2">
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-3">
                <p class="text-[10px] uppercase tracking-wider text-emerald-400 font-semibold">GA</p>
                <p id="total-ga" class="text-3xl font-black tabular-nums">{{ admission_totals.ga }}</p>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-3">
                <p class="text-[10px] uppercase tracking-wider text-purple-400 font-semibold">VIP</p>
                <p id="total-vip" class="text-3xl font-black tabular-nums">{{ admission_totals.vip }}</p>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-3">
                <p class="text-[10px] uppercase tracking-wider text-zinc-400 font-semibold">Total</p>
                <p id="total-all" class="text-3xl font-black tabular-nums">{{ admission_totals.total }}</p>
                <p id="capacity-progress" class="hidden text-[10px] text-zinc-500 mt-1 tabular-nums"></p>
            </div>
        </div>

        <div id="capacity-banner"
             class="hidden mb-3 rounded-2xl border border-amber-400/40 bg-amber-400/10 px-4 py-3 text-sm text-amber-200">
            Max capacity reached — congrats on selling this place out!
        </div>

        <div class="mb-4 flex items-center justify-center gap-2 text-xs flex-wrap">
            <label for="max-capacity-input" class="text-zinc-500">Max capacity</label>
            <input type="number"
                   id="max-capacity-input"
                   min="1"
                   step="1"
                   placeholder="No limit"
                   value="{{ admission_totals.max_capacity or '' }}"
                   class="w-24 bg-zinc-900 border border-zinc-700 rounded-lg px-2 py-1.5 text-white text-center focus:outline-none focus:border-zinc-500">
            <button type="button"
                    onclick="saveMaxCapacity()"
                    class="text-zinc-400 hover:text-white transition-colors">
                Save
            </button>
            <span class="text-zinc-700">|</span>
            <button type="button"
                    onclick="resetAdmissionTotals()"
                    class="text-zinc-500 hover:text-red-400 transition-colors">
                Reset counts
            </button>
        </div>

        <div id="reset-history" class="hidden mb-4 text-left rounded-2xl border border-zinc-800 bg-zinc-900/60 px-4 py-3">
            <p class="text-[10px] uppercase tracking-wider text-zinc-500 mb-2">Count reset history</p>
            <ul id="reset-history-list" class="space-y-2 text-xs text-zinc-400 max-h-36 overflow-y-auto"></ul>
        </div>

        <h1 class="text-3xl sm:text-4xl font-bold mb-2">🎟️ Door Scanner</h1>
        <p class="text-zinc-400 text-sm mb-4">Tap start, then point at the guest's QR code</p>

        <div id="reader" class="w-full aspect-[5/6] bg-black rounded-3xl overflow-hidden mb-4 border-4 border-zinc-700 hidden"></div>

        <button id="start-btn"
                onclick="startScanner()"
                class="w-full py-4 mb-4 bg-white text-black font-semibold rounded-2xl text-lg">
            Start Scanner
        </button>

        <div id="result" class="text-xl font-medium min-h-[140px] p-5 rounded-3xl bg-zinc-900"></div>

        <button id="scan-again-btn"
                onclick="restartScanner()"
                class="hidden mt-6 px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">
            Scan Another Ticket
        </button>
    </div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    let scanning = false;

    const scannerConfig = {
        fps: 10,
        qrbox: (viewfinderWidth, viewfinderHeight) => {
            const size = Math.floor(Math.min(viewfinderWidth, viewfinderHeight) * 0.88);
            return { width: size, height: size };
        },
        disableFlip: false,
    };

    function updateAdmissionTotals(totals) {
        if (!totals) return;
        document.getElementById('total-ga').textContent = totals.ga;
        document.getElementById('total-vip').textContent = totals.vip;
        document.getElementById('total-all').textContent = totals.total;

        const progressEl = document.getElementById('capacity-progress');
        const bannerEl = document.getElementById('capacity-banner');
        const maxInput = document.getElementById('max-capacity-input');

        if (maxInput && document.activeElement !== maxInput && totals.max_capacity) {
            maxInput.value = totals.max_capacity;
        }

        if (progressEl) {
            if (totals.max_capacity) {
                progressEl.textContent = `${totals.total} / ${totals.max_capacity}`;
                progressEl.classList.remove('hidden');
            } else {
                progressEl.classList.add('hidden');
            }
        }

        if (bannerEl) {
            if (totals.capacity_reached) {
                bannerEl.classList.remove('hidden');
            } else {
                bannerEl.classList.add('hidden');
            }
        }

        updateResetHistory(totals.reset_history);
    }

    function formatResetTimestamp(iso) {
        if (!iso) return 'Unknown time';
        const date = new Date(iso);
        if (Number.isNaN(date.getTime())) return iso;
        return date.toLocaleString(undefined, {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
        });
    }

    function updateResetHistory(history) {
        const section = document.getElementById('reset-history');
        const list = document.getElementById('reset-history-list');
        if (!section || !list) return;

        const entries = Array.isArray(history) ? [...history].reverse() : [];
        if (!entries.length) {
            section.classList.add('hidden');
            list.innerHTML = '';
            return;
        }

        section.classList.remove('hidden');
        list.innerHTML = entries.map(entry => {
            const when = formatResetTimestamp(entry.reset_at);
            const ga = entry.ga ?? 0;
            const vip = entry.vip ?? 0;
            const total = entry.total ?? (ga + vip);
            return `<li class="flex items-center justify-between gap-3 border-b border-zinc-800/80 pb-2 last:border-0 last:pb-0">
                <span class="text-zinc-500">${when}</span>
                <span class="tabular-nums text-zinc-300">GA ${ga} · VIP ${vip} · ${total} total</span>
            </li>`;
        }).join('');
    }

    function redirectToScannerLogin() {
        const next = window.location.pathname + window.location.search;
        window.location.href = '/verify/login?next=' + encodeURIComponent(next);
    }

    async function refreshAdmissionTotals() {
        try {
            const response = await fetch('/api/admission-totals');
            if (response.status === 401) {
                redirectToScannerLogin();
                return;
            }
            const totals = await response.json();
            updateAdmissionTotals(totals);
        } catch (err) {
            console.warn('Failed to refresh admission totals', err);
        }
    }

    async function saveMaxCapacity() {
        const input = document.getElementById('max-capacity-input');
        const raw = (input.value || '').trim();
        const payload = { max_capacity: raw === '' ? null : Number(raw) };

        if (payload.max_capacity !== null && (!Number.isFinite(payload.max_capacity) || payload.max_capacity < 1)) {
            alert('Enter a whole number of 1 or higher, or leave blank for no limit.');
            return;
        }

        try {
            const response = await fetch('/api/scanner-settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            if (response.status === 401) {
                redirectToScannerLogin();
                return;
            }
            if (!response.ok) {
                alert('Failed to save max capacity. Please try again.');
                return;
            }
            const totals = await response.json();
            updateAdmissionTotals(totals);
            if (!totals.max_capacity) {
                input.value = '';
            }
        } catch (err) {
            console.warn('Failed to save max capacity', err);
            alert('Failed to save max capacity. Check your connection and try again.');
        }
    }

    async function resetAdmissionTotals() {
        const confirmed = window.confirm(
            'Are you sure you want to reset admission counts?\n\n' +
            'GA, VIP, and Total will go back to 0 for a new counting period. ' +
            'Already-scanned tickets stay void and cannot be scanned again. ' +
            'This reset will be logged with the date and attendance totals.'
        );
        if (!confirmed) return;

        try {
            const response = await fetch('/api/admission-totals/reset', { method: 'POST' });
            if (response.status === 401) {
                redirectToScannerLogin();
                return;
            }
            if (!response.ok) {
                alert('Failed to reset counts. Please try again.');
                return;
            }
            const totals = await response.json();
            updateAdmissionTotals(totals);
        } catch (err) {
            console.warn('Failed to reset admission totals', err);
            alert('Failed to reset counts. Check your connection and try again.');
        }
    }

    function onScanSuccess(decodedText) {
        if (!scanning) return;
        scanning = false;

        stopScanner();

        if (decodedText.includes('/verify/t/')) {
            if (typeof markScannerInternalNav === 'function') {
                markScannerInternalNav();
            }
            window.location.href = decodedText.startsWith('http')
                ? decodedText
                : `${window.location.origin}${decodedText.startsWith('/') ? '' : '/'}${decodedText}`;
            return;
        }

        const resultEl = document.getElementById('result');
        resultEl.innerHTML = `<span class="text-yellow-400">Verifying ticket...</span>`;
        document.getElementById('scan-again-btn').classList.add('hidden');

        fetch('/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticket_data: decodedText })
        })
        .then(r => {
            if (r.status === 401) {
                redirectToScannerLogin();
                return null;
            }
            return r.json();
        })
        .then(result => {
            if (!result) return;
            if (result.admission_totals) {
                updateAdmissionTotals(result.admission_totals);
            }
            if (result.status === 'accepted') {
                const typeLabel = result.is_vip ? 'VIP' : 'GA';
                const typeColor = result.is_vip ? 'text-purple-400' : 'text-emerald-400';
                const guestWord = result.quantity === 1 ? 'guest' : 'guests';
                const soldOutNote = result.admission_totals && result.admission_totals.capacity_reached
                    ? '<div class="text-amber-300 text-sm mt-4">Max capacity reached — congrats on selling this place out!</div>'
                    : '';
                resultEl.innerHTML = `
                    <div class="text-white text-2xl font-bold mb-1">✅ You're In!</div>
                    <div class="text-6xl font-black leading-none mb-2 ${typeColor}">${typeLabel}</div>
                    <div class="text-3xl font-bold text-white">${result.quantity} ${guestWord}</div>
                    ${soldOutNote}
                `;
            } else if (result.status === 'sold_out') {
                resultEl.innerHTML = `
                    <div class="text-amber-300 text-2xl font-bold mb-2">🎉 Sold Out</div>
                    <div class="text-zinc-200">Max capacity reached — congrats on selling this place out!</div>
                `;
            } else if (result.status === 'used') {
                const guestWord = result.quantity === 1 ? 'guest' : 'guests';
                resultEl.innerHTML = `
                    <div class="text-red-400 text-2xl font-bold mb-2">❌ Already Used</div>
                    <div class="text-zinc-300">${result.quantity} ${guestWord} on this ticket</div>
                `;
            } else {
                resultEl.innerHTML = `<span class="text-red-400 text-xl">Invalid ticket</span>`;
            }
            document.getElementById('scan-again-btn').classList.remove('hidden');
        })
        .catch(() => {
            resultEl.innerHTML = `<span class="text-red-400">Verification failed - check connection</span>`;
            document.getElementById('scan-again-btn').classList.remove('hidden');
        });
    }

    function onScanFailure() {
        // Ignore - fires constantly when no QR visible
    }

    async function pickCamera() {
        try {
            const cameras = await Html5Qrcode.getCameras();
            if (!cameras.length) {
                return { facingMode: "environment" };
            }

            const backCamera = cameras.find(cam => {
                const label = (cam.label || '').toLowerCase();
                return label.includes('back') || label.includes('rear') || label.includes('environment');
            });

            return backCamera ? backCamera.id : cameras[cameras.length - 1].id;
        } catch (err) {
            return { facingMode: "environment" };
        }
    }

    async function stopScanner() {
        scanning = false;
        try {
            if (html5QrCode.isScanning) {
                await html5QrCode.stop();
            }
        } catch (err) {
            console.warn('Scanner stop error:', err);
        }
        try {
            html5QrCode.clear();
        } catch (err) {
            console.warn('Scanner clear error:', err);
        }
    }

    async function startScanner() {
        const resultEl = document.getElementById('result');
        const readerEl = document.getElementById('reader');
        const startBtn = document.getElementById('start-btn');

        startBtn.classList.add('hidden');
        readerEl.classList.remove('hidden');
        resultEl.innerHTML = `<span class="text-zinc-400">Starting camera...</span>`;
        document.getElementById('scan-again-btn').classList.add('hidden');

        try {
            await stopScanner();
            const camera = await pickCamera();
            await html5QrCode.start(camera, scannerConfig, onScanSuccess, onScanFailure);
            scanning = true;
            sessionStorage.setItem('doorScannerAutostart', '1');
            resultEl.innerHTML = `<span class="text-zinc-400">Point camera at QR code</span>`;
        } catch (err) {
            console.error("Scanner start error:", err);
            readerEl.classList.add('hidden');
            startBtn.classList.remove('hidden');
            resultEl.innerHTML = `<span class="text-red-400">Failed to start camera. Allow camera access and tap Start again.<br><span class="text-sm text-zinc-500">${err}</span></span>`;
        }
    }

    async function restartScanner() {
        await refreshAdmissionTotals();
        await startScanner();
    }

    function shouldAutostartScanner() {
        const params = new URLSearchParams(window.location.search);
        return params.get('autostart') === '1' || sessionStorage.getItem('doorScannerAutostart') === '1';
    }

    window.addEventListener('DOMContentLoaded', () => {
        updateAdmissionTotals({
            ga: {{ admission_totals.ga }},
            vip: {{ admission_totals.vip }},
            total: {{ admission_totals.total }},
            max_capacity: {{ admission_totals.max_capacity if admission_totals.max_capacity else 'null' }},
            capacity_reached: {{ 'true' if admission_totals.capacity_reached else 'false' }},
            reset_history: {{ admission_totals.reset_history | tojson }},
        });
        refreshAdmissionTotals();
        if (shouldAutostartScanner()) {
            startScanner();
        }
    });
</script>
    <script src="{{ url_for('static', filename='js/scanner_session.js') }}"></script>
</body>
</html>
