<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Door Scanner Login • The Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">Door Scanner</h1>
            <p class="text-zinc-400 text-sm">Staff login required</p>
        </div>

        {% if error %}
        <div class="mb-6 bg-red-900/40 border border-red-500/50 rounded-2xl p-4 text-red-200 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 space-y-5">
            {% if next_url %}
            <input type="hidden" name="next" value="{{ next_url }}">
            {% endif %}
            <div>
                <label for="email" class="block text-sm text-zinc-400 mb-2">Email</label>
                <input type="email" id="email" name="email" required autocomplete="username"
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-white">
            </div>
            <div>
                <label for="password" class="block text-sm text-zinc-400 mb-2">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-white">
            </div>
            <button type="submit"
                    class="w-full py-4 border-2 border-white bg-black text-white font-semibold rounded-2xl hover:bg-white hover:text-black transition-colors">
                Sign in
            </button>
        </form>
    </div>
</body>
</html>
