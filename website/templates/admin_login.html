<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login • The Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">Ticket Admin</h1>
            <p class="text-zinc-400 text-sm">Enter your admin key to continue</p>
        </div>

        {% if error %}
        <div class="mb-6 bg-red-900/40 border border-red-500/50 rounded-2xl p-4 text-red-200 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/admin/login" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 space-y-5">
            {% if next_path %}
            <input type="hidden" name="next" value="{{ next_path }}">
            {% endif %}
            <div>
                <label for="key" class="block text-sm text-zinc-400 mb-2">Admin key</label>
                <input type="password" id="key" name="key" required autocomplete="current-password"
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-white"
                       placeholder="Admin key">
            </div>
            <button type="submit"
                    class="w-full py-4 border-2 border-white bg-black text-white font-semibold rounded-2xl hover:bg-white hover:text-black transition-colors">
                Sign in
            </button>
        </form>

        <p class="mt-6 text-center text-xs text-zinc-500">
            This is not the member portal or door scanner login.
        </p>
    </div>
</body>
</html>
