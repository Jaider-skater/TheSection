<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">
    <div class="text-center">
    <h1 class="text-4xl font-bold mb-4">🎟️ Your Tickets</h1>
    {% if ticket_data %}
    <img src="data:image/png;base64,{{ ticket_data }}"
         alt="QR Ticket"
         class="mx-auto border-4 border-white rounded-2xl shadow-2xl mb-6">
    {% endif %}

    {% if ticket_id %}
    <p class="text-sm text-zinc-400 mb-8">Ticket ID: <strong>{{ ticket_id }}</strong></p>
    {% endif %}

    {% if email %}
    <p class="text-emerald-400">Confirmation sent to: <strong>{{ email }}</strong></p>
    {% endif %}
</div>
</body>
</html>
