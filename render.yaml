services:
  - type: web
    name: thesection
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TICKETS_FILE
        value: /opt/render/project/src/data/tickets.json
      - key: MEMBERS_FILE
        value: /opt/render/project/src/data/legacy_members.json
      - key: SCANNER_SETTINGS_FILE
        value: /opt/render/project/src/data/scanner_settings.json
      - key: INVITES_FILE
        value: /opt/render/project/src/data/member_invites.json
      - key: INVITE_EXPIRY_DAYS
        value: "14"
      - key: MEMBER_DISCOUNT
        value: "0.10"
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_TIMEOUT
        value: "10"
      - key: BASE_URL
        value: https://thesection.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: VERIFY_LOGIN_EMAIL
        sync: false
      - key: VERIFY_LOGIN_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
