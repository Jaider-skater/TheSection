services:
  - type: web
    name: thesection
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    disk:
      name: thesection-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: BASE_URL
        value: https://thesection.onrender.com
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        value: hallieworkshop@gmail.com
      - key: MEMBERS_FILE
        value: /opt/render/project/src/data/legacy_members.json
      - key: TICKETS_FILE
        value: /opt/render/project/src/data/tickets.json
      - key: INVITES_FILE
        value: /opt/render/project/src/data/member_invites.json
      - key: INVITE_EXPIRY_DAYS
        value: "14"
      - key: APP_TIMEZONE
        value: America/Los_Angeles
      - key: LEGACY_BOOTSTRAP_EMAIL
        value: hallieworkshop@gmail.com
      - key: LEGACY_BOOTSTRAP_PASSWORD
        sync: false
      - key: VERIFY_LOGIN_EMAIL
        sync: false
      - key: VERIFY_LOGIN_PASSWORD
        sync: false
      # Secret key from Stripe Dashboard → Developers → API keys
      # Use sk_live_... for real charges; sk_test_... stays in sandbox.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: BUNDLE_DISCOUNT
        value: "0.10"
      - key: LEGACY_BUNDLE_DISCOUNT
        value: "0.10"
      - key: VIP_BUNDLE_DISCOUNT
        value: "0.10"
